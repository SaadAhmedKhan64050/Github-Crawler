name: GitHub Repo Crawler

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  crawl:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: github_crawler
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d github_crawler"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: github_crawler
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Postgres
        run: |
          until pg_isready -h "$POSTGRES_HOST" -p "$POSTGRES_PORT" -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do
            echo "Waiting for Postgres..."
            sleep 2
          done

      - name: Setup postgres schema
        run: |
          echo "Checking files"
          ls -R

          echo "Running schema.sql"

          PGPASSWORD="$POSTGRES_PASSWORD" psql \
            -v ON_ERROR_STOP=1 \
            -h "$POSTGRES_HOST" \
            -p "$POSTGRES_PORT" \
            -U "$POSTGRES_USER" \
            -d "$POSTGRES_DB" \
            -f ./app/infrastructure/db/schema.sql

      - name: Verify postgres schema
        run: |
          PGPASSWORD="$POSTGRES_PASSWORD" psql \
            -h "$POSTGRES_HOST" \
            -p "$POSTGRES_PORT" \
            -U "$POSTGRES_USER" \
            -d "$POSTGRES_DB" \
            -c "SELECT schema_name FROM information_schema.schemata ORDER BY schema_name;" \
            -c "SELECT table_schema, table_name FROM information_schema.tables ORDER BY table_schema, table_name;"

      - name: Crawl stars
        run: |
          python -m app.main

      - name: Export repositories to CSV
        run: |
          PGPASSWORD="$POSTGRES_PASSWORD" psql \
            -h "$POSTGRES_HOST" \
            -p "$POSTGRES_PORT" \
            -U "$POSTGRES_USER" \
            -d "$POSTGRES_DB" \
            -c "COPY (SELECT * FROM github_crawler.repositories) TO STDOUT WITH CSV HEADER" \
            > repositories.csv

      - name: Dump database
        run: |
          PGPASSWORD="$POSTGRES_PASSWORD" pg_dump \
            -h "$POSTGRES_HOST" \
            -p "$POSTGRES_PORT" \
            -U "$POSTGRES_USER" \
            -d "$POSTGRES_DB" \
            > github_crawler_dump.sql

      - name: Upload CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: repositories-csv
          path: repositories.csv

      - name: Upload database dump artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-crawler-db-dump
          path: github_crawler_dump.sql